name = "serverstatus-worker"
main = "src/index.js"
compatibility_date = "2026-04-03"

[[d1_databases]]
binding = "DB"
database_name = "serverstatus"
database_id = "replace-with-your-d1-id"

[[kv_namespaces]]
binding = "CACHE"
id = "replace-with-your-kv-id"

[vars]
DASHBOARD_TITLE = "Server Status"
AGENT_SHARED_SECRET = "change-me"
ADMIN_SHARED_SECRET = "change-me-too"
DEFAULT_HEARTBEAT_TIMEOUT_SEC = "180"
CF_ZONE_ID = ""
CF_ZONE_NAME = ""
ALERT_WEBHOOK_URL = ""
TELEGRAM_BOT_TOKEN = ""
TELEGRAM_CHAT_ID = ""

[triggers]
crons = ["*/1 * * * *"]
